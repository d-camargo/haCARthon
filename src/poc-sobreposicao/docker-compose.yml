# PoC de detecção de sobreposição — PostGIS (alinhado à pilha do RER)
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: poc
      POSTGRES_PASSWORD: poc
      POSTGRES_DB: poc
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/sql:ro
      - ./dados:/dados:ro
      - ./saida:/saida
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc -d poc"]
      interval: 3s
      timeout: 3s
      retries: 20
